<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101010">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Air Hockey Online</title>
    <link rel="icon" href="apple-touch-icon.png" type="image/png" sizes="180x180">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="rink-wrap" aria-label="Air hockey table">
        <canvas id="rink" width="590" height="1024"></canvas>
        <div class="scorebar" aria-live="polite">
          <div class="score-side">
            <span class="dot dot-you"></span>
            <span id="youLabel">You</span>
            <strong id="youScore">0</strong>
          </div>
          <div class="room-pill" id="roomPill">Offline</div>
          <div class="score-side score-side-right">
            <strong id="opponentScore">0</strong>
            <span id="opponentLabel">Opponent</span>
            <span class="dot dot-them"></span>
          </div>
        </div>
        <div class="center-status" id="centerStatus">Choose a mode</div>
      </section>

      <aside class="panel" aria-label="Game controls">
        <header>
          <p class="eyebrow">Online Air Hockey</p>
          <h1>First to 7</h1>
        </header>

        <div class="segmented" role="group" aria-label="Puck count">
          <button class="segment active" id="onePuckButton" type="button">1 puck</button>
          <button class="segment" id="twoPuckButton" type="button">2 pucks</button>
        </div>

        <div class="actions">
          <button class="primary" id="quickButton" type="button">Quick Match</button>
          <button id="createButton" type="button">Create Room</button>
          <button id="botButton" type="button">Practice Bot</button>
        </div>

        <form class="join-row" id="joinForm">
          <input id="roomInput" autocomplete="off" maxlength="6" placeholder="Room code" aria-label="Room code">
          <button type="submit">Join</button>
        </form>

        <div class="room-tools">
          <button id="copyButton" type="button" disabled>Copy Link</button>
          <button id="restartButton" type="button" disabled>Restart</button>
          <button id="leaveButton" type="button" disabled>Leave</button>
        </div>

        <dl class="meta">
          <div>
            <dt>Room</dt>
            <dd id="roomCode">-</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd id="connectionStatus">Connecting</dd>
          </div>
          <div>
            <dt>Ping</dt>
            <dd id="pingStatus">-</dd>
          </div>
        </dl>
      </aside>
    </main>

    <div class="sound-gate" id="soundGate" role="dialog" aria-modal="true" aria-labelledby="soundGateTitle" hidden>
      <div class="sound-gate__panel">
        <h2 id="soundGateTitle">Enable Sound</h2>
        <p id="soundGateHint">Tap once to start this session with sound</p>
        <button class="sound-gate__button" id="soundGateButton" type="button">Enable Sound and Start</button>
      </div>
    </div>

    <script src="runtime-config.js"></script>
    <script src="vendor/matter.min.js"></script>
    <script src="client.js" type="module"></script>
  </body>
</html>
