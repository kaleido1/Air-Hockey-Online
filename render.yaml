services:
  - type: web
    name: air-hockey-online-kaleido1
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: AIR_HOCKEY_WEBRTC_SIGNALING
        value: "1"
      - key: AIR_HOCKEY_WEBRTC_ICE_SERVERS
        value: '[{"urls":["stun:stun.l.google.com:19302","stun:stun1.l.google.com:19302"]}]'
